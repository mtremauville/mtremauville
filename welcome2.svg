<svg fill="none" viewBox="0 0 600 400" width="600" height="400" xmlns="http://www.w3.org/2000/svg">
<foreignObject width="100%" height="100%">
<div xmlns="http://www.w3.org/1999/xhtml">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;
}

.body{
  height:400px;
  width:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#020202; /* Noir profond */
  position: relative;
  overflow: hidden;
}

.container{
  width:80%;
  max-width:520px;
  position: relative;
  z-index: 10;
}

/* --- LE NOUVEL EFFET GLOWTIME (APPLIQUÉ AU TERMINAL) --- */
.terminal{
  /* Arrière-plan dégradé bleu -> magenta/rouge de l'image "Glowtime" */
  background: linear-gradient(135deg, #1e40af 0%, #a21caf 50%, #be123c 100%); 
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.1);
  box-shadow: 0 10px 40px rgba(0,0,0,0.6); 
  
  /* Ajout d'une lueur subtile autour du terminal */
  position: relative;
}

.terminal::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  border-radius: 12px;
  box-shadow: 0 0 20px rgba(162, 28, 175, 0.4); /* Lueur violette diffuse */
  z-index: -1;
}

.terminal-header{
  height:32px;
  background: rgba(45, 55, 72, 0.8); /* En-tête légèrement transparent */
  display:flex;
  align-items:center;
  padding-left:12px;
  gap:8px;
}

.circle{ width:12px; height:12px; border-radius:50%; }
.red{ background:#FF5F56; }
.yellow{ background:#FFBD2E; }
.green-dot{ background:#27C93F; }

.terminal-body{ 
  padding:30px; 
}

/* --- STYLE DU TEXTE BLANC ET BRILLANT --- */
.line{
  font-size:18px;
  margin-bottom:10px;
  white-space:nowrap;
  overflow:hidden;
  width:0;
  color: #FFFFFF; /* Texte blanc pur */
  /* Ombre de texte pour simuler la lueur blanche "Glowtime" */
  text-shadow: 0 0 5px rgba(255, 255, 255, 0.8), 0 0 10px rgba(255, 255, 255, 0.5); 
  animation: typing 2s steps(30,end) forwards;
}

.line:nth-child(2){ animation-delay: 2s; }
.line:nth-child(3){ 
  animation-delay: 4s; 
  display: flex;
  align-items: center;
}

/* Modification du curseur pour qu'il soit blanc brillant également */
.cursor{
  display:inline-block;
  width:10px;
  height:20px;
  background: #FFFFFF;
  margin-left:5px;
  animation: blink 1s step-end infinite;
}

@keyframes typing{
  from{ width: 0; }
  to{ width: 100%; }
}

@keyframes blink{
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}
</style>

<div class="body">
  
  <div class="container">
    <div class="terminal">
      <div class="terminal-header">
        <div class="circle red"></div>
        <div class="circle yellow"></div>
        <div class="circle green-dot"></div>
      </div>

      <div class="terminal-body">
        <div class="line">$ whoami</div>
        <div class="line">Mickael Tremauville</div>
        <div class="line">
          <span>Junior AI Software Engineer</span> <span class="cursor"></span>
        </div>
      </div>
    </div>
  </div>
</div>

</div>
</foreignObject>
</svg>
