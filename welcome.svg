<svg fill="none" viewBox="0 0 600 400" width="600" height="400" xmlns="http://www.w3.org/2000/svg">
<foreignObject width="100%" height="100%">
<div xmlns="http://www.w3.org/1999/xhtml">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;
}

.body{
  --blue:#2563EB;
  --gray:#1F2937;
  --white:#FFFFFF;
  --terminal-green:#27C93F; /* Vert standard terminal */

  height:400px;
  width:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#000000;
  border:8px solid var(--blue);
}

.container{
  width:80%;
  max-width:520px;
}

.terminal{
  background:var(--gray);
  color:var(--white);
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.terminal-header{
  height:32px;
  background:#2d3748;
  display:flex;
  align-items:center;
  padding-left:12px;
  gap:8px;
}

.circle{
  width:12px;
  height:12px;
  border-radius:50%;
}

.red{ background:#FF5F56; }
.yellow{ background:#FFBD2E; }
.green-dot{ background:#27C93F; } /* Renommé pour éviter conflit */

.terminal-body{
  padding:30px;
}

.line{
  font-size:18px;
  margin-bottom:10px;
  white-space:nowrap;
  overflow:hidden;
  width:0;
  animation:typing 2s steps(30,end) forwards;
}

.line:nth-child(2){ animation-delay: 2s; }
.line:nth-child(3){ 
  animation-delay: 4s; 
  width: 0;
  display: flex;
  align-items: center;
}

/* Texte en vert */
.text-green{
  color: var(--terminal-green);
}

@keyframes typing{
  from{ width: 0; }
  to{ width: 100%; }
}

/* Animation de clignotement corrigée */
@keyframes blink{
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}
  
.cursor{
  display:inline-block;
  width:10px;
  height:20px;
  background: var(--terminal-green);
  margin-left:5px;
  animation: blink 1s step-end infinite;
}
</style>

<div class="body">
  <div class="container">
    <div class="terminal">
      <div class="terminal-header">
        <div class="circle red"></div>
        <div class="circle yellow"></div>
        <div class="circle green-dot"></div>
      </div>
      <div class="terminal-body">
        <div class="line">$ whoami</div>
        <div class="line">Mickael Tremauville</div>
        <div class="line">
          <span class="text-green">Junior AI Software Engineer</span>
          <span class="cursor"></span>
        </div>
      </div>
    </div>
  </div>
</div>

</div>
</foreignObject>
</svg>
